<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05060a" />
    <meta name="color-scheme" content="dark" />

    <title data-default>Weborys — Digital Studio Crafting Premium Web Experiences</title>
    <meta
      name="description"
      data-default
      content="Weborys is a modern digital studio designing and developing high-quality websites, web applications, and digital experiences for ambitious brands."
    />
    <meta name="author" content="Weborys" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://weborys.com" data-canonical />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Weborys" />
    <meta property="og:title" content="Weborys — Digital Studio Crafting Premium Web Experiences" data-og-title />
    <meta
      property="og:description"
      content="We design and develop modern websites, web applications, and digital experiences that help businesses grow online."
      data-og-desc
    />
    <meta property="og:url" content="https://weborys.com" data-og-url />
    <meta property="og:image" content="https://weborys.com/og-image.png" data-og-image />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Weborys — Digital Studio" data-tw-title />
    <meta name="twitter:description" content="Premium websites, web apps, and digital experiences." data-tw-desc />
    <meta name="twitter:image" content="https://weborys.com/og-image.png" data-tw-image />

    <!-- Fonts: preconnect + display swap for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: Organization -->
    <script type="application/ld+json" data-ld-org>
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Weborys",
      "url": "https://weborys.com",
      "email": "b53595205@gmail.com",
      "telephone": "+91 9149960912",
      "description": "Modern digital studio designing and developing high-quality websites, web applications, and digital experiences.",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
